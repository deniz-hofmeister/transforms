name: tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  formatting:
    name: formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          components: rustfmt
          toolchain: nightly
      - name: Rustfmt Check
        uses: actions-rust-lang/rustfmt@4066006ec54a31931b9b1fddfd38f2fdf2d27143

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          components: clippy
          toolchain: stable
      - name: Clippy (std)
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (no_std)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

  tests:
    name: tests (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # The full suite executes natively on both deployment
        # architectures: x86_64 (dev machines, industrial PCs) and ARM64
        # (Raspberry Pi, NVIDIA Jetson).
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          toolchain: stable
      - name: Run tests (std)
        run: cargo test
      - name: Run tests (no_std)
        run: cargo test --no-default-features

  serde:
    name: serde (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          toolchain: stable
      - name: Run tests (std + serde)
        run: cargo test --features serde
      - name: Run tests (no_std + serde)
        run: cargo test --no-default-features --features serde

  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          toolchain: stable
      - name: Build docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          toolchain: "1.86"
      - name: Check (std)
        run: cargo check --all-targets
      - name: Check (no_std)
        run: cargo check --all-targets --no-default-features

  examples:
    name: examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          toolchain: stable
      - name: Run example std_minimal
        run: cargo run --example std_minimal
      - name: Run example std_full
        run: cargo run --example std_full
      - name: Run example std_advanced
        run: cargo run --example std_advanced
      - name: Run example no_std_minimal
        run: cargo run --example no_std_minimal --no-default-features
      - name: Run example no_std_full
        run: cargo run --example no_std_full --no-default-features
      - name: Run example no_std_advanced
        run: cargo run --example no_std_advanced --no-default-features

  benches:
    name: benches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          toolchain: stable
      - name: Bench smoke test (std)
        run: cargo bench -- --test
      - name: Bench smoke test (no_std)
        run: cargo bench --no-default-features -- --test

  bare-metal:
    name: bare-metal (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # STM32 F4/F7/H7, nRF52, Teensy 4 — Cortex-M4F/M7, the dominant
          # flight-controller class (PX4/Pixhawk, ArduPilot, Betaflight).
          - thumbv7em-none-eabihf
          # RP2040 / Raspberry Pi Pico — Cortex-M0+: soft float and no
          # compare-and-swap atomics, the strictest portability check.
          - thumbv6m-none-eabi
          # RP2350, nRF5340, STM32 H5/U5 — Cortex-M33, current generation.
          - thumbv8m.main-none-eabihf
          # ESP32-C3/C6, GD32V — RISC-V, guards against ARM-only assumptions.
          - riscv32imc-unknown-none-elf
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          toolchain: stable
      - name: Install bare-metal target
        run: rustup target add ${{ matrix.target }}
      - name: Build for ${{ matrix.target }}
        run: cargo build --no-default-features --target ${{ matrix.target }}

  security:
    name: security
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          toolchain: stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Generate lockfile
        run: cargo generate-lockfile
      - name: Audit dependencies
        run: cargo audit
